# 测试环境配置 - 使用 H2 内存数据库
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# 启用 schema 初始化
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# JWT 配置
jwt.secret=test-secret-key-for-unit-tests-only-1234567890abcdef
jwt.expire=43200000

# 安全配置
security.permit-all-paths=/api/login,/api/register,/api/setup/**,/error

# 服务器配置
gameServerIp=127.0.0.1
gameServerScriptPort=9001
rcon.host=127.0.0.1
rcon.port=25575
rcon.password=test
rcon.timeout=5000

# AI 配置
ai.llm.provider=api
ai.llm.base-url=https://test.example.com/v1
ai.llm.api-key=test-key
ai.llm.pro-model=test-model
ai.llm.flash-model=test-flash-model

spring.main.allow-circular-references=true
